<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments</title>
    <link rel="stylesheet" href="css/style_HRM.css">
</head>
<body>
<header>
    <img src="image/Logo.png" alt="Logo of company" class="header-logo">
    <h1>Humain resource management</h1>
</header>
<main>
    <section>
        <h2>Company Departments</h2>
        <br>
        <div class="employee-grid">
            <div style="border: 5px solid #ddd; padding: 20px; border-radius: 5px;">
                <h3>Human Resources (HR)</h3>
                <p>Quantity: 5 members</p>
                <p>Location: Room 201</p>
            </div>
            <div style="border: 5px solid #ddd; padding: 20px; border-radius: 5px;">
                <h3>IT Department</h3>
                <p>Quantity: 15 members</p>
                <p>Location: Room 404</p>
            </div>
            <div style="border: 5px solid #ddd; padding: 20px; border-radius: 5px;">
                <h3>Marketing</h3>
                <p>Quantity: 8 members</p>
                <p>Location: Room 102</p>
            </div>
        </div>
    </section>
</main>

</body>
</html>
