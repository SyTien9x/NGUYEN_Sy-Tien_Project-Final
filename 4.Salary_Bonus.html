<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary and Bonus</title>
    <link rel="stylesheet" href="css/style_HRM.css">
    <style>
        /* add the style directly here instead of in css */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #0056b3; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
<header>
    <img src="image/Logo.png" alt="Logo of company" class="header-logo">
    <h1>Humain resource management</h1>
</header>
<main>
    <section>
        <h2>Salary & Bonus Management</h2>
        <table>
            <thead>
            <tr>
                <th>Employee ID</th>
                <th>Full Name</th>
                <th>Base Salary</th>
                <th>Bonus</th>
                <th>Total Pay</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>EMP001</td>
                <td>John Doe</td>
                <td>$2,500</td>
                <td>$300</td>
                <td><strong>$2,800</strong></td>
            </tr>
            <tr>
                <td>EMP002</td>
                <td>Jane Smith</td>
                <td>$3,000</td>
                <td>$500</td>
                <td><strong>$3,500</strong></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

</body>
</html>
