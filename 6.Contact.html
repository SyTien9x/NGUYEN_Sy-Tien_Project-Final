<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee / Contact</title>
    <link rel="stylesheet" href="css/style_HRM.css">
</head>
<body>
<header>
    <img src="image/Logo.png" alt="Logo of company" class="header-logo">
    <h1>Humain resource management</h1>
</header>
<main>
    <section style="max-width: 600px; margin: 0 auto;">
        <h2>Add New Employee / Contact HR</h2>
        <br>
        <form action="#" method="POST">
            <div>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required placeholder="Ex: Max Dol">
            </div>

            <div>
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="Ex: max.dol@global.com">
            </div>

            <div>
                <label for="department">Department:</label>
                <select id="department" name="department">
                    <option value="hr">Human Resources</option>
                    <option value="it">IT Department</option>
                    <option value="marketing">Marketing</option>
                </select>
            </div>
            <div>
                <label for="hiredate">Hiredate:</label>
                <input type="date" id="hiredate" name="hiredate">
            </div>
            <div>
                <label for="salary">Salary($):</label>
                <input type="number" min="0" step="0.01" id="salary" name="salary" required placeholder="Ex:4000">
            </div>
            <div>
                <label for="message">Notes / Contact Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Type employee details or your message here..."></textarea>
            </div>

            <div>
                <button type="submit" style="background: #0056b3; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;">
                    Submit Data
                </button>
            </div>
        </form>
    </section>
</main>

</body>
</html>
